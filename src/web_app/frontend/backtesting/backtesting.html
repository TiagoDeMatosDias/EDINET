<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.ico" />
    <title>Shade Research — Backtesting</title>
    <link rel="stylesheet" href="/assets/common/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div class="app-shell" style="grid-template-rows:52px 1fr;">
      <header class="topbar">
        <div class="brand">
          <img class="brand-logo" src="/brand-assets/icon_hexagon.svg" alt="Shade Research" />
          <div>
            <div class="brand-title">Shade Research</div>
            <div class="brand-subtitle">terminal-style research console</div>
          </div>
        </div>
        <nav class="tabs" aria-label="Primary navigation">
          <button class="tab" onclick="location.href='/'">Main</button>
          <button class="tab" onclick="location.href='/orchestrator'">Orchestrator</button>
          <button class="tab" onclick="location.href='/screening'">Screening</button>
          <button class="tab is-active" onclick="void 0">Backtesting</button>
          <button class="tab" onclick="location.href='/security'">Security Analysis</button>
        </nav>
        <div class="topbar-actions">
          <div class="status-pill" id="bt-backend-status">Connecting…</div>
          <button class="ghost-btn" id="refresh-btn">Refresh</button>
        </div>
      </header>

      <main class="workspace">
        <section class="view is-active" data-view-panel="backtesting">
          <div id="bt-root"></div>
        </section>
      </main>
    </div>

    <script type="module" src="/assets/backtesting/backtesting.js"></script>
  </body>
</html>
