<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shade Research — Security Analysis</title>
    <link rel="stylesheet" href="/assets/common/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <img class="brand-logo" src="/brand-assets/icon_hexagon.svg" alt="Shade Research" />
          <div>
            <div class="brand-title">Shade Research</div>
            <div class="brand-subtitle">terminal-style research console</div>
          </div>
        </div>
        <nav class="tabs" aria-label="Primary navigation">
          <button class="tab" onclick="location.href='/'">Main</button>
          <button class="tab" onclick="location.href='/orchestrator'">Orchestrator</button>
          <button class="tab" onclick="location.href='/screening'">Screening</button>
          <button class="tab is-active" onclick="void 0">Security Analysis</button>
        </nav>
        <div class="topbar-actions">
          <div class="status-pill" id="backend-status">Connecting…</div>
          <button class="ghost-btn" id="toggle-console-btn">Hide Console</button>
          <button class="ghost-btn" id="refresh-btn">Refresh</button>
        </div>
      </header>

      <main class="workspace">
        <section class="view is-active" data-view-panel="security">
          <div id="security-root"></div>
        </section>
      </main>

      <footer class="console panel">
        <div class="panel-head console-head">
          <div>
            <div class="panel-title">Console</div>
            <div class="panel-subtitle">Dense, terminal-style event stream.</div>
          </div>
          <div class="console-actions">
            <button class="tiny-btn" id="console-toggle">Hide</button>
            <button class="tiny-btn" id="console-clear">Clear</button>
            <button class="tiny-btn" id="console-export">Export</button>
            <label class="toggle"><input id="console-autoscroll" type="checkbox" checked /> Auto-scroll</label>
            <select id="console-filter">
              <option value="all">All</option>
              <option value="info">Info</option>
              <option value="warn">Warn</option>
              <option value="error">Error</option>
              <option value="debug">Debug</option>
            </select>
          </div>
        </div>
        <div id="console-log" class="console-log" aria-live="polite"></div>
      </footer>
    </div>

    <script type="module" src="/assets/security_analysis/security.js"></script>
  </body>
</html>
