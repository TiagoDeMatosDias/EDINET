<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.ico" />
    <title>Shade Research — Security Analysis</title>
    <link rel="stylesheet" href="/assets/common/styles.css" />
    <link rel="stylesheet" href="/assets/security_analysis/security.css" />
  </head>
  <body>
    <div class="app-shell" style="grid-template-rows:52px 1fr;">
      <header class="topbar">
        <div class="brand">
          <img class="brand-logo" src="/brand-assets/icon_hexagon.svg" alt="Shade Research" />
          <div>
            <div class="brand-title">Shade Research</div>
            <div class="brand-subtitle">terminal-style research console</div>
          </div>
        </div>
        <nav class="tabs" aria-label="Primary navigation">
          <button class="tab" onclick="location.href='/'">Main</button>
          <button class="tab" onclick="location.href='/orchestrator'">Orchestrator</button>
          <button class="tab" onclick="location.href='/screening'">Screening</button>
          <button class="tab" onclick="location.href='/backtesting'">Backtesting</button>
          <button class="tab is-active" onclick="void 0">Security Analysis</button>
          <button class="tab" onclick="location.href='/portfolio'">Portfolio</button>
        </nav>
        <div class="topbar-actions">
          <div class="status-pill" id="sa-backend-status">Connecting…</div>
          <button class="btn-ghost" id="refresh-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><polyline points="21 2 21 8 15 8"/><path d="M21 12a9 9 0 1 0-3.1 7"/></svg>
            Refresh
          </button>
        </div>
      </header>

      <main class="workspace">
        <section class="view is-active" data-view-panel="security">

          <!-- ── Search bar ── -->
          <div class="sa-toolbar" id="sa-toolbar">
            <div class="sa-search-wrap">
              <input type="text" class="sa-search-input" id="sa-search"
                placeholder="Search by ticker, EDINET code, or company name…"
                autocomplete="off" disabled />
              <div class="sa-search-dropdown" id="sa-search-dropdown"></div>
            </div>
            <div class="sa-recent-chips" id="sa-recent-chips"></div>
            <div class="sa-status" id="sa-status">Initializing…</div>
          </div>

          <!-- ── Summary section ── -->
          <div class="sa-summary" id="sa-summary"></div>
          <div class="sa-banner sa-banner-warn" id="sa-banner" style="display:none"></div>

          <!-- ── Empty state ── -->
          <div class="sa-empty" id="sa-empty">
            <div class="sa-empty-icon">📊</div>
            <div class="sa-empty-title" id="sa-empty-title">Search for a company to begin</div>
            <div class="sa-empty-sub" id="sa-empty-sub">Type a ticker, EDINET code, or company name above.</div>
          </div>

          <!-- ── Tab bar ── -->
          <div class="sa-tabbar" id="sa-tabbar"></div>

          <!-- ── Tree grid + Chart panel (split view) ── -->
          <div class="sa-workspace-split" id="sa-workspace-split">
            <div class="sa-tree-panel" id="sa-tree-panel"></div>
            <div class="sa-chart-panel" id="sa-chart-panel"></div>
          </div>

        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.2.0/dist/chartjs-plugin-zoom.min.js"></script>
    <script type="module" src="/assets/security_analysis/security.js"></script>
  </body>
</html>
