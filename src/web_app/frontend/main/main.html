<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.ico" />
    <title>Shade Research — Main</title>
    <link rel="stylesheet" href="/assets/common/styles.css" />
  </head>
  <body>
    <div class="app-shell" style="grid-template-rows:52px 1fr;">
      <header class="topbar">
        <div class="brand">
          <img class="brand-logo" src="/brand-assets/icon_hexagon.svg" alt="Shade Research" />
          <div>
            <div class="brand-title">Shade Research</div>
            <div class="brand-subtitle">terminal-style research console</div>
          </div>
        </div>

        <nav class="tabs" aria-label="Primary navigation">
          <button class="tab is-active" onclick="void 0" aria-current="page">Main</button>
          <button class="tab" onclick="location.href='/orchestrator'">Orchestrator</button>
          <button class="tab" onclick="location.href='/screening'">Screening</button>
          <button class="tab" onclick="location.href='/backtesting'">Backtesting</button>
          <button class="tab" onclick="location.href='/security'">Security Analysis</button>
        </nav>

        <div class="topbar-actions">
          <div class="status-pill" id="backend-status">Connecting…</div>
          <button class="btn-ghost" id="refresh-btn">Refresh</button>
        </div>
      </header>

      <main class="workspace">
        <section class="view is-active" data-view-panel="main">
          <div class="main-grid">
            <section class="panel" id="jobs-panel">
              <div class="panel-head">
                <div>
                  <div class="panel-title">Recent Jobs</div>
                </div>
                <button class="btn-ghost btn-sm" id="reload-jobs">Reload</button>
              </div>
              <div class="panel-body">
                <div class="table-wrap">
                  <table class="data-table" id="jobs-table">
                    <thead>
                      <tr>
                        <th>Job ID</th>
                        <th>Status</th>
                        <th>Current Step</th>
                        <th>Progress</th>
                        <th>Created</th>
                      </tr>
                    </thead>
                    <tbody></tbody>
                  </table>
                </div>
              </div>
            </section>

            <aside class="side-stack">
              <section class="panel" id="metrics-panel">
                <div class="panel-head">
                  <div class="panel-title">Status</div>
                </div>
                <div class="panel-body">
                  <div class="metric-grid" id="main-metrics"></div>
                </div>
              </section>

              <section class="panel" id="setups-panel">
                <div class="panel-head">
                  <div class="panel-title">Local Setups</div>
                </div>
                <div id="setup-list" class="list"></div>
              </section>

              <section class="panel" id="catalog-panel">
                <div class="panel-head">
                  <div class="panel-title">Quick Add Step</div>
                </div>
                <div id="step-catalog-preview" class="list"></div>
              </section>
            </aside>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/assets/main/main.js"></script>
  </body>
</html>
